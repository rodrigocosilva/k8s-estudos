---
# NAMESPACE PARA ORGANIZAÇÃO
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring-lab

---
# POSTGRES 16 (DB para Zabbix e Grafana)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: monitoring-lab
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_PASSWORD
          value: "zabbix"
        - name: POSTGRES_DB
          value: "zabbix"
        - name: POSTGRES_USER
          value: "zabbix"
        ports:
        - containerPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: monitoring-lab
spec:
  selector:
    app: postgres
  ports:
  - port: 5432

---
# ZABBIX SERVER 7.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-server
  namespace: monitoring-lab
spec:
  selector:
    matchLabels:
      app: zabbix-server
  template:
    metadata:
      labels:
        app: zabbix-server
    spec:
      containers:
      - name: zabbix-server
        image: zabbix/zabbix-server-pgsql:7.0-alpine-latest
        env:
        - name: DB_SERVER_HOST
          value: "postgres-db"
        - name: POSTGRES_USER
          value: "zabbix"
        - name: POSTGRES_PASSWORD
          value: "zabbix"
        - name: POSTGRES_DB
          value: "zabbix"
        ports:
        - containerPort: 10051

---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-server
  namespace: monitoring-lab
spec:
  selector:
    app: zabbix-server
  ports:
  - name: trapper
    port: 10051
    targetPort: 10051        

---
# ZABBIX WEB (UI)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: monitoring-lab
spec:
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
      - name: zabbix-web
        image: zabbix/zabbix-web-nginx-pgsql:7.0-alpine-latest
        env:
        - name: ZBX_SERVER_HOST
          value: "zabbix-server"
        - name: DB_SERVER_HOST
          value: "postgres-db"
        - name: POSTGRES_USER
          value: "zabbix"
        - name: POSTGRES_PASSWORD
          value: "zabbix"
        - name: POSTGRES_DB
          value: "zabbix"
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-web
  namespace: monitoring-lab
spec:
  selector:
    app: zabbix-web
  ports:
  - port: 8080
    targetPort: 8080        

---
# PROMETHEUS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring-lab
spec:
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring-lab
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090        

---
apiVersion: v1
kind: Service
metadata:
  name: expose-prometheus
  namespace: monitoring-lab
spec:
  type: LoadBalancer
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090        

---
# GRAFANA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring-lab
spec:
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000

---
# JAEGER (All-in-one para Lab)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring-lab
spec:
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        ports:
        - containerPort: 16686 # UI
        - containerPort: 4317  # OTLP gRPC (Pronto para OpenTelemetry)

---
# SERVIÇOS PARA ACESSO (Expondo portas no OrbStack)
apiVersion: v1
kind: Service
metadata:
  name: expose-services
  namespace: monitoring-lab
spec:
  type: LoadBalancer
  selector:
    app: zabbix-web
  ports:
    - name: zabbix-ui
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: expose-grafana
  namespace: monitoring-lab
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: expose-jaeger
  namespace: monitoring-lab
spec:
  type: LoadBalancer
  selector:
    app: jaeger
  ports:
    - port: 16686
      targetPort: 16686